<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Vibe Quant - 計算機</title>
    <style>
        body { background-color: #37474F; color: #ECEFF1; font-family: 'Inter', sans-serif; }
        .accent-color { color: #78909C; }
        .glass-card { background: rgba(55, 71, 79, 0.8); border: 1px solid #78909C; border-radius: 12px; }
        .input-box { background: #263238; border: 1px solid #455A64; border-radius: 4px; padding: 8px; width: 100%; color: white; }
        .input-box:focus { border-color: #78909C; outline: none; }
        .signal-indicator { transition: all 0.5s ease; border-left: 6px solid #455A64; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-end border-b border-[#455A64] pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter accent-color italic">VIBE_QUANT</h1>
                <p class="text-[10px] opacity-40 uppercase tracking-[0.3em]">Advanced Stock Turnover Analysis</p>
            </div>
            <div class="text-[10px] opacity-60 text-right">系統狀態：即時邏輯判定中</div>
        </header>

        <div class="glass-card p-6 mb-6 grid grid-cols-1 md:grid-cols-3 gap-6 shadow-xl">
            <div>
                <label class="block text-xs accent-color font-bold mb-2 uppercase">發行張數</label>
                <input type="number" id="totalShares" value="100000" class="input-box" oninput="runCalc()">
            </div>
            <div>
                <label class="block text-xs accent-color font-bold mb-2 uppercase">內部人持股張數</label>
                <input type="number" id="insiderShares" value="30000" class="input-box" oninput="runCalc()">
            </div>
            <div>
                <label class="block text-xs accent-color font-bold mb-2 uppercase">浮動股 (自動計算)</label>
                <div id="floatShares" class="text-2xl font-mono border-b border-[#455A64] py-1">--</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-6">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-xs accent-color mb-1">台股代號 / ETF</label>
                            <input type="text" id="stockId" class="input-box text-lg font-bold" placeholder="2330 / 0050" onblur="updateName()">
                        </div>
                        <div>
                            <label class="block text-xs accent-color mb-1">股票名稱</label>
                            <div id="stockName" class="py-2 text-lg font-bold border-b border-[#455A64]">---</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-xs opacity-60 mb-1">今日成交量</label>
                            <input type="number" id="volToday" value="5000" class="input-box" oninput="runCalc()">
                        </div>
                        <div>
                            <label class="block text-xs opacity-60 mb-1">5日均量</label>
                            <input type="number" id="vol5D" value="1500" class="input-box" oninput="runCalc()">
                        </div>
                        <div>
                            <label class="block text-xs opacity-60 mb-1">10日均量</label>
                            <input type="number" id="vol10D" value="1200" class="input-box" oninput="runCalc()">
                        </div>
                        <div>
                            <label class="block text-xs opacity-60 mb-1">90日均量</label>
                            <input type="number" id="vol90D" value="1000" class="input-box" oninput="runCalc()">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-4 bg-opacity-30">
                    <h3 class="text-[10px] accent-color font-bold mb-3 uppercase tracking-widest">信號判斷標準 (Logic Reference)</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-[11px]">
                        <div class="border-l-2 border-green-500 pl-2">
                            <div class="font-bold">啟動</div>
                            <div class="opacity-60">換手 >5%<br>量比 2-3</div>
                        </div>
                        <div class="border-l-2 border-yellow-500 pl-2">
                            <div class="font-bold">加速</div>
                            <div class="opacity-60">換手 5-10%<br>量比 3-5</div>
                        </div>
                        <div class="border-l-2 border-red-600 pl-2">
                            <div class="font-bold">高位</div>
                            <div class="opacity-60">換手 >10%<br>量比 >5</div>
                        </div>
                        <div class="border-l-2 border-gray-400 pl-2">
                            <div class="font-bold">撤退</div>
                            <div class="opacity-60">換手 >5%<br>量比 <2</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass-card p-6">
                    <h3 class="text-xs accent-color mb-4 uppercase font-bold">即時分析數據</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b border-[#455A64] pb-2">
                            <span class="text-xs opacity-60">短期量比 (5D)</span>
                            <span id="resRatioShort" class="text-xl font-mono">--</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-[#455A64] pb-2">
                            <span class="text-xs opacity-60">短期換手率</span>
                            <span id="resTurnoverShort" class="text-xl font-mono text-yellow-500">--</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-[#455A64] pb-2">
                            <span class="text-xs opacity-60">長期量比 (10D/90D)</span>
                            <span id="resRatioLong" class="text-xl font-mono">--</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-[#455A64] pb-2">
                            <span class="text-xs opacity-60">長期換手率</span>
                            <span id="resTurnoverLong" class="text-xl font-mono text-yellow-500">--</span>
                        </div>
                    </div>
                </div>

                <div id="signalBox" class="signal-indicator glass-card p-6 bg-[#263238]">
                    <div class="text-[10px] accent-color mb-1 uppercase font-bold tracking-widest">智能交易信號</div>
                    <div id="signalText" class="text-2xl font-black italic">等待數據中...</div>
                    <div id="signalSub" class="text-[10px] opacity-40 mt-2">根據短期換手率與量比即時判定</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mockNames = {'2330':'台積電','0050':'元大台灣50','2454':'聯發科','00878':'國泰永續高股息','2317':'鴻海'};

        function updateName() {
            const id = document.getElementById('stockId').value;
            document.getElementById('stockName').innerText = mockNames[id] || "手動追蹤個股";
            runCalc();
        }

        function runCalc() {
            const total = parseFloat(document.getElementById('totalShares').value) || 0;
            const insider = parseFloat(document.getElementById('insiderShares').value) || 0;
            const today = parseFloat(document.getElementById('volToday').value) || 0;
            const v5 = parseFloat(document.getElementById('vol5D').value) || 1;
            const v10 = parseFloat(document.getElementById('vol10D').value) || 1;
            const v90 = parseFloat(document.getElementById('vol90D').value) || 1;

            const floatS = total - insider;
            document.getElementById('floatShares').innerText = floatS.toLocaleString() + " 張";

            if (floatS <= 0) return;

            // 短期計算 (短期換手 = 5日量/浮動股*100 | 量比 = 今日/5日)
            const turnoverS = (v5 / floatS) * 100;
            const ratioS = today / v5;

            // 長期計算 (長期換手 = 10日量/浮動股*100 | 量比 = 10日/90日)
            const turnoverL = (v10 / floatS) * 100;
            const ratioL = v10 / v90;

            document.getElementById('resRatioShort').innerText = ratioS.toFixed(2);
            document.getElementById('resTurnoverShort').innerText = turnoverS.toFixed(2) + "%";
            document.getElementById('resRatioLong').innerText = ratioL.toFixed(2);
            document.getElementById('resTurnoverLong').innerText = turnoverL.toFixed(2) + "%";

            updateSignal(turnoverS, ratioS);
        }

        function updateSignal(turnover, ratio) {
            const box = document.getElementById('signalBox');
            const txt = document.getElementById('signalText');
            
            // 嚴格執行提供的判定邏輯
            if (turnover > 10 && ratio > 5) {
                txt.innerText = "🚨 高位：快跑";
                box.style.borderColor = "#FF5252";
                txt.style.color = "#FF5252";
            } else if (turnover >= 5 && turnover <= 10 && ratio >= 3 && ratio <= 5) {
                txt.innerText = "🚀 加速：起飛";
                box.style.borderColor = "#FFD740";
                txt.style.color = "#FFD740";
            } else if (turnover > 5 && ratio >= 2 && ratio < 3) {
                txt.innerText = "📈 啟動：買進";
                box.style.borderColor = "#69F0AE";
                txt.style.color = "#69F0AE";
            } else if (turnover > 5 && ratio < 2) {
                txt.innerText = "📉 撤退：小心先跑";
                box.style.borderColor = "#B0BEC5";
                txt.style.color = "#B0BEC5";
            } else {
                txt.innerText = "🌑 盤整觀察";
                box.style.borderColor = "#455A64";
                txt.style.color = "#ECEFF1";
            }
        }

        runCalc();
    </script>
</body>
</html>
